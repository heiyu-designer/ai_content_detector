version: "3.8"

# ============================================
# 容器隔离说明
# ============================================
# 所有容器、卷、网络都使用 ${PROJECT_NAME} 作为前缀
# 不同项目部署时修改 .env 中的 PROJECT_NAME 即可实现完全隔离
#
# 例如：
#   项目 A: PROJECT_NAME=project_a  →  project_a_mysql, project_a_redis, project_a_network
#   项目 B: PROJECT_NAME=project_b  →  project_b_mysql, project_b_redis, project_b_network
#
# 两个项目的 MySQL、Redis、Nginx 完全隔离，互不影响
# ============================================

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: ${PROJECT_NAME:-unbot}_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-unbot_secure_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-unbot_ai}
      MYSQL_USER: ${MYSQL_USER:-unbot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unbot_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - ${PROJECT_NAME:-unbot}_mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ${PROJECT_NAME:-unbot}_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-unbot}_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${PROJECT_NAME:-unbot}_redis_data:/data
    networks:
      - ${PROJECT_NAME:-unbot}_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME:-unbot}_backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-30001}:30001"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE:-unbot_ai}
      - DB_USER=${MYSQL_USER:-unbot}
      - DB_PASSWORD=${MYSQL_PASSWORD:-unbot_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimax.chat}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ${PROJECT_NAME:-unbot}_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理（可选，用于前端静态文件和 API 代理）
  nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME:-unbot}_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./frontend/dist:/usr/share/nginx/html
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - ${PROJECT_NAME:-unbot}_network
    profiles:
      - production

networks:
  ${PROJECT_NAME:-unbot}_network:
    driver: bridge

volumes:
  ${PROJECT_NAME:-unbot}_mysql_data:
    driver: local
  ${PROJECT_NAME:-unbot}_redis_data:
    driver: local
