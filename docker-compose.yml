version: "3.8"

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: unbot_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-unbot_secure_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-unbot_ai}
      MYSQL_USER: ${MYSQL_USER:-unbot}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unbot_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - unbot_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: unbot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - unbot_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: unbot_backend
    restart: unless-stopped
    ports:
      - "30001:30001"
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${MYSQL_DATABASE:-unbot_ai}
      - DB_USER=${MYSQL_USER:-unbot}
      - DB_PASSWORD=${MYSQL_PASSWORD:-unbot_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key-change-in-production}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimax.chat}
      - DEBUG=${DEBUG:-false}
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - unbot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:30001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理（可选，用于前端静态文件和 API 代理）
  nginx:
    image: nginx:alpine
    container_name: unbot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./frontend/dist:/usr/share/nginx/html
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
    networks:
      - unbot_network
    # 仅在需要时启用（SSL 证书准备好后）
    profiles:
      - production

networks:
  unbot_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
